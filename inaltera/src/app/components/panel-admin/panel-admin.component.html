<aside class="admin-panel" *ngIf="esAdmin">
  <div class="admin-header">
    <mat-icon>admin_panel_settings</mat-icon>
    <span>Control Maestro</span>
  </div>

  <section class="admin-section">
    <h4>Navegación</h4>
    <nav>
      <a routerLink="/admin/usuarios"><mat-icon>people</mat-icon> Gestión Usuarios</a>
      <a routerLink="/admin/logs"><mat-icon>history</mat-icon> Auditoría Global</a>
      <a routerLink="/admin/blockchain"><mat-icon>Account_tree</mat-icon> Estado Red</a>
    </nav>
  </section>

  <hr class="divider">

  <section class="admin-section">
    <h4>Funciones Inmediatas</h4>
    
    <div class="quick-action">
      <label>ID Usuario a Investigar</label>
      <input type="number" [(ngModel)]="idBusqueda" placeholder="Ej: 42">
      <button (click)="ejecutarMiradorManual(idBusqueda)">Lanzar Mirador</button>
    </div>

    <div class="quick-action">
      <mat-checkbox [(ngModel)]="modoMantenimiento" (change)="toggleMantenimiento()">
        Modo Mantenimiento
      </mat-checkbox>
    </div>

    <button class="btn-danger" (click)="limpiarCacheGlobal()">
      <mat-icon>delete_sweep</mat-icon> Limpiar Caché Servidor
    </button>
  </section>

  <hr class="divider">
  <section class="admin-section">
    <h4>Vigilante</h4>
    <app-uso-seguridad tipo="ojo"></app-uso-seguridad>
    
    <button (click)="refrescarAuditoria()">Verificar Ahora</button>
  </section>
